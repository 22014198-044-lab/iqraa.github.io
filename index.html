<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iqra Aslam Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg, #ea6692, #934ba2, #d6ff75);
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    position:sticky;
    top:0;
}

.logo{
    font-size:22px;
    font-weight:600;
}

.nav-links{
    display:flex;
    list-style:none;
}

.nav-links li{
    margin-left:20px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.nav-links a:hover{
    color:#ffd700;
}

/* MOBILE MENU */
.menu-toggle{
    display:none;
    font-size:24px;
    cursor:pointer;
}

/* PROFILE */
.profile{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:80px 20px;
    gap:50px;
}

.profile-img img{
    width:260px;
    border-radius:50%;
    border:5px solid white;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.4s;
}

.profile-img img:hover{
    transform:scale(1.08) rotate(2deg);
}

.profile-text{
    max-width:500px;
}

.profile-text h1{
    font-size:38px;
}

.profile-text p{
    margin-top:15px;
    line-height:1.6;
}

/* 🔘 BUTTON STYLES */
.btn-group{
    margin-top:25px;
    display:flex;
    gap:15px;
}

/* Primary Button */
.btn-primary{
    padding:10px 20px;
    border:none;
    background: linear-gradient(45deg, #ff9a9e, #fad0c4);
    color:black;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

.btn-primary:hover{
    transform:scale(1.1);
}

/* Outline Button */
.btn-outline{
    padding:10px 20px;
    border:2px solid white;
    background:transparent;
    color:white;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

.btn-outline:hover{
    background:white;
    color:black;
}

/* Glow Button */
.btn-glow{
    padding:10px 20px;
    border:none;
    background:#00f2fe;
    color:black;
    border-radius:30px;
    box-shadow:0 0 15px #00f2fe;
    cursor:pointer;
    transition:0.3s;
}

.btn-glow:hover{
    box-shadow:0 0 30px #00f2fe;
}

/* SKILLS */
.skills{
    padding:50px 20px;
    text-align:center;
}

.skills h2{
    margin-bottom:30px;
}

.skill-box{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background: rgba(255,255,255,0.15);
    padding:20px;
    width:200px;
    border-radius:15px;
    backdrop-filter: blur(10px);
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
}

/* RESPONSIVE */
@media(max-width:768px){

    .menu-toggle{
        display:block;
    }

    .nav-links{
        position:absolute;
        top:60px;
        right:0;
        width:100%;
        background:rgba(0,0,0,0.9);
        flex-direction:column;
        display:none;
        align-items:center;
    }

    .nav-links.active{
        display:flex;
    }

    .nav-links li{
        margin:15px 0;
    }

    .profile{
        flex-direction:column;
        text-align:center;
    }

    .btn-group{
        justify-content:center;
        flex-wrap:wrap;
    }

    .profile-img img{
        width:180px;
    }

    .profile-text h1{
        font-size:26px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">Iqra Aslam</div>
    <div class="menu-toggle" id="menu-toggle">☰</div>

    <ul class="nav-links" id="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Story</a></li>
        <li><a href="#">Skills</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<!-- PROFILE -->
<section class="profile">
    <div class="profile-img">
        <img src="profile.jpg" alt="My Photo">
    </div>

    <div class="profile-text">
        <h1>Hello, I'm Iqra Aslam</h1>
        <p>
            I am a creative web development student passionate about building modern,
            responsive and visually appealing websites.
        </p>

        <!-- 🔘 MULTIPLE BUTTONS -->
        <div class="btn-group">
            <button class="btn-primary">Hire Me</button>
            <button class="btn-outline">Download CV</button>
            <button class="btn-glow">Contact</button>
        </div>
    </div>
</section>

<!-- SKILLS -->
<section class="skills">
    <h2>My Skills</h2>

    <div class="skill-box">
        <div class="card">HTML</div>
        <div class="card">CSS</div>
        <div class="card">JavaScript</div>
        <div class="card">C++</div>
    </div>
</section>

<script>
const toggle = document.getElementById("menu-toggle");
const nav = document.getElementById("nav-links");

toggle.addEventListener("click", () => {
    nav.classList.toggle("active");
});
</script>

</body>
</html>
